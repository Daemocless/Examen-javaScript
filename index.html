<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el Hiragana</title>
    <link rel="stylesheet" href="css/estilos.css">

</head>

<body>
    <main>
        <section class="card">
            <h2>Juego Hiragana</h2>
            <div class="block">
                <img id="imagen" style="max-width: 50%;" src="assets/a.jpg" alt="interrogante" />

            </div>
            <form id="formularioAlumno" autocomplete="off">
                <input type="hidden" id="id" />
                <div class="grid">
                    <label>
                        <input type="text" id="nombre" required minlength="1" required
                            placeholder="Escribe el nombre de la imagen actual" />
                    </label>
                    <div class="actions">
                        <button type="submit" class="primary" id="btnGuardarFormulario">Comprobar</button>
                        <button type="button" class="secondary" id="btnResetLS">Resetear</button>
                    </div>
            </form>
        </section>
        <section class="card">
            <h2>Resumen</h2>

            <div class="tableHeader">
                <article>
                    <h4>Aciertos</h4>
                    <p>0</p>
                </article>

                <article>
                    <h4>Fallos</h4>
                    <p>0</p>
                </article>

                <article>
                    <h4>Intentos</h4>
                    <p>0</p>
                </article>

                <article>
                    <h4>Pendientes</h4>
                    <p>0</p>
                </article>
            </div>
            </div>
            <div class="tableWrap">
                <h3>Historial de Respuesta</h3>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Respuesta Escrita</th>
                            <th>Resultado</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyrespuesta">
                    </tbody>
                </table>
            </div>
    </main>
</body>
<script type="module" src="js/app.js"></script>

</html>
